name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Rig

      - uses: actions/checkout@v4
        with:
          repository: Amulet-Laboratories/Config
          path: Config

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: Rig/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Rig
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: Rig
        run: pnpm lint

      - name: Type check
        working-directory: Rig
        run: pnpm typecheck

      - name: Unit tests
        working-directory: Rig
        run: pnpm test

      - name: Build
        working-directory: Rig
        run: pnpm build
