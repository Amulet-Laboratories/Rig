name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod

      - name: Build Hex themes
        working-directory: hex
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests with coverage
        run: vitest run --reporter=default --reporter=json --outputFile=.health/tests.json --coverage

      - name: Build library
        run: pnpm build

      - name: Run benchmarks
        run: vitest bench --run --outputJson=.health/bench.json

      - name: Run comparison benchmarks
        run: pnpm comparison && pnpm cross-comparison

      - name: Generate health manifest
        run: node scripts/generate-health-manifest.mjs && tsx scripts/collect-intelligence.ts

      - name: Upload health artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: health-manifest
          path: |
            .health/manifest.json
            .health/comparison.json
            .health/intelligence.json
            .health/perf.json
          retention-days: 30
