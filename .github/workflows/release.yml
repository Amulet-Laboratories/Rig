name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Tests
        run: pnpm vitest run

      - name: Build Hex themes
        working-directory: hex
        run: pnpm build

      - name: Build library
        run: pnpm build

      - name: Check exports
        run: node scripts/check-exports.mjs

      - name: Verify clean working tree
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: working tree is dirty — uncommitted changes detected before publish"
            git status --short
            exit 1
          fi

      # Publishes are idempotent: if the version in package.json is already on
      # npm (e.g. a re-run of the same tag, or a release published manually),
      # skip rather than hard-fail on "cannot publish over existing version".
      - name: Publish @amulet-laboratories/rig
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@amulet-laboratories/rig@${VERSION}" version >/dev/null 2>&1; then
            echo "rig@${VERSION} is already published — skipping."
          else
            pnpm publish --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @amulet-laboratories/hex
        working-directory: hex
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@amulet-laboratories/hex@${VERSION}" version >/dev/null 2>&1; then
            echo "hex@${VERSION} is already published — skipping."
          else
            pnpm publish --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # A release-notes hiccup must not mark a successful publish as failed.
      - name: Create GitHub Release
        if: always()
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
